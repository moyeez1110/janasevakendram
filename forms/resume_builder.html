<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder – Live Preview</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #f0ede8;
  --panel: #ffffff;
  --border: #ddd9d0;
  --accent: #2d4a3e;
  --accent2: #c0392b;
  --accent3: #1a2744;
  --text: #1a1a1a;
  --muted: #6b6560;
  --light: #f7f5f2;
  --gold: #b5963e;
  --teal: #1D9E75;
  --font-body: 'DM Sans', sans-serif;
  --font-display: 'DM Serif Display', serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}

.header{background:var(--accent);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.logo{font-family:var(--font-display);font-size:22px;color:#fff;letter-spacing:.3px}
.logo span{color:#a8d5b5}
.tpl-bar{display:flex;gap:6px;align-items:center}
.tpl-label{font-size:11px;color:#a8d5b5;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-right:4px}
.tb{border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);font-family:var(--font-body);transition:all .15s;display:flex;align-items:center;gap:5px}
.tb:hover{background:rgba(255,255,255,.18);color:#fff}
.tb.active{background:#fff;color:var(--accent);font-weight:600;border-color:#fff}
.tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gen-btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);display:flex;align-items:center;gap:6px;transition:background .15s}
.gen-btn:hover{background:#9a7d30}

.layout{display:flex;height:calc(100vh - 54px)}

.lpanel{width:270px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tabs{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--border);background:var(--light)}
.tab{padding:9px 2px;font-size:10.5px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--font-body);text-align:center;border-bottom:2.5px solid transparent;transition:all .12s;font-weight:500}
.tab:hover{color:var(--text);background:#f0ede8}
.tab.active{color:var(--accent);border-bottom:2.5px solid var(--accent);background:#fff;font-weight:600}
.fbody{padding:14px;overflow-y:auto;flex:1}
.fl{font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.06em}
.fi{width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--text);font-family:var(--font-body);margin-bottom:10px;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,74,62,.1)}
textarea.fi{resize:vertical;line-height:1.5}
select.fi{cursor:pointer}
.fdiv{height:1px;background:var(--border);margin:10px 0}
.iw{position:relative;margin-bottom:10px}
.iw .fi{padding-left:34px;margin-bottom:0}
.iw .ii{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none;transition:color .2s}
.iw .fi:focus~.ii,.iw .fi:not(:placeholder-shown)~.ii{color:var(--accent)}
.iw-ta{position:relative;margin-bottom:10px}
.iw-ta textarea{padding-left:34px;margin-bottom:0}
.iw-ta .ii{position:absolute;left:10px;top:12px;font-size:13px;color:var(--muted);pointer-events:none}
.iw-ta textarea:focus~.ii{color:var(--accent)}
.ci{display:inline-flex;align-items:center;gap:4px;font-family:Georgia,serif}
.ci i{font-size:9px;opacity:.75}

.sum-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin:10px 0 6px}
.sum-opt{display:block;padding:8px 10px;border:1px solid var(--border);border-radius:7px;cursor:pointer;margin-bottom:6px;transition:all .12s;background:#fff}
.sum-opt:hover{border-color:var(--accent);background:#f0f7f4}
.sum-opt .so-title{font-size:12px;font-weight:600;color:var(--text)}
.sum-opt .so-preview{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.4}
.sum-opt.picked{border:1.5px solid var(--teal);background:#e8f7f2}
.sum-opt.picked .so-title{color:var(--teal)}

.skill-row{display:flex;gap:6px;margin-bottom:10px}
.skill-row .fi{margin-bottom:0;flex:1}
.sadd{padding:7px 10px;background:var(--accent);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font-body);white-space:nowrap}
.sadd:hover{background:#1e3329}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.pill{display:flex;align-items:center;gap:4px;font-size:11.5px;padding:4px 10px;border-radius:99px;background:#e8f7f2;color:var(--accent);font-weight:500;border:1px solid rgba(45,74,62,.2)}
.pill button{background:none;border:none;cursor:pointer;color:var(--accent);font-size:14px;line-height:1;padding:0;opacity:.6}
.pill button:hover{opacity:1}

.exp-card{background:var(--light);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:10px}
.exp-ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.exp-cl{font-size:12px;font-weight:600;color:var(--text)}
.exp-rem{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:3px 7px;border-radius:5px;font-family:var(--font-body);transition:all .12s}
.exp-rem:hover{background:#fde8e8;color:var(--accent2)}
.add-exp{width:100%;padding:8px;border:1.5px dashed var(--border);background:none;border-radius:8px;color:var(--accent);font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--font-body);margin-bottom:10px;transition:all .15s}
.add-exp:hover{background:#f0f7f4;border-color:var(--accent)}

.rpanel{flex:1;background:#c8c4be;overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;padding:24px 16px}
.doc-wrap{width:100%;max-width:560px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.25))}
.doc{background:#fff;width:100%;font-family:Georgia,serif;position:relative}

/* ══ TEMPLATE: Classic ══ */
.t-classic .dh{padding:30px 36px 18px;text-align:center;border-bottom:3px double #222}
.t-classic .dn{font-size:26px;font-weight:700;color:#111;letter-spacing:.5px;font-family:Georgia,serif}
.t-classic .dr{font-size:12px;color:#555;margin-top:4px;letter-spacing:2px;text-transform:uppercase;font-family:Georgia,serif}
.t-classic .dc{font-size:11px;color:#444;margin-top:8px;font-family:Georgia,serif}
.t-classic .db{padding:18px 36px 24px}
.t-classic .sh{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#111;border-bottom:1.5px solid #bbb;padding-bottom:4px;margin:16px 0 8px;font-family:Georgia,serif}
.t-classic .st{font-size:11.5px;color:#333;line-height:1.7;font-family:Georgia,serif}
.t-classic .stag{font-size:11px;padding:3px 9px;border:1px solid #888;color:#333;font-family:Georgia,serif;display:inline-block;margin:2px}
.t-classic .pdg{display:grid;grid-template-columns:1fr 1fr;gap:3px 16px}
.t-classic .pdi{font-size:11px;color:#333;font-family:Georgia,serif;padding:2px 0}
.t-classic .pdk{color:#777;font-style:italic}
.t-classic .exco{font-size:12px;font-weight:700;color:#111;font-family:Georgia,serif}
.t-classic .ext{font-size:11px;color:#555;font-family:Georgia,serif}
.t-classic .exd{font-size:11px;color:#333;line-height:1.6;margin-top:4px;font-family:Georgia,serif;padding-left:12px}
.t-classic .extd{font-size:10.5px;color:#777;font-family:Georgia,serif;font-style:italic;margin-top:1px;display:flex;align-items:center;gap:5px}
.t-classic .extd::before{content:"\f017";font-family:"Font Awesome 6 Free";font-weight:900;font-size:9px;color:#aaa}
.t-classic .decl-box{margin-top:20px;border:1px solid #ddd;background:#fafafa;padding:12px 14px}
.t-classic .decl-txt{font-size:10.5px;color:#444;line-height:1.7;font-family:Georgia,serif;font-style:italic}
.t-classic .sig{display:flex;justify-content:space-between;margin-top:30px;padding-top:12px;border-top:1.5px solid #ccc}
.t-classic .sigb{text-align:center;font-size:11px;color:#555;font-family:Georgia,serif}
.t-classic .sigl{width:120px;height:1px;background:#999;margin:22px auto 4px}

/* ══ TEMPLATE: Modern ══ */
.t-modern .doc{display:flex;min-height:100%}
.t-modern .dsb{width:170px;flex-shrink:0;background:#1a2744;padding:24px 16px;display:flex;flex-direction:column}
.t-modern .dm{flex:1;padding:24px 20px}
.t-modern .dav{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#3a5a9e,#1a2744);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 10px;border:2px solid rgba(255,255,255,.2);font-family:Georgia,serif}
.t-modern .dn{font-size:15px;font-weight:700;color:#fff;text-align:center;line-height:1.3;font-family:Georgia,serif}

.t-modern .sbh{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#94b0d6;border-bottom:1px solid #2e3e62;padding-bottom:3px;margin:14px 0 6px;font-family:Georgia,serif}
.t-modern .sbi{font-size:10px;color:#c8d8f0;margin-bottom:3px;font-family:Georgia,serif;word-break:break-all}
.t-modern .sb-skill{font-size:10px;color:#c8d8f0;padding:2px 0;border-bottom:.5px solid #2a3a5e;margin-bottom:3px;font-family:Georgia,serif}
.t-modern .sh{font-size:12px;font-weight:700;color:#1a2744;border-left:4px solid #1a2744;padding-left:8px;margin:14px 0 7px;font-family:Georgia,serif;letter-spacing:.3px}
.t-modern .st{font-size:11.5px;color:#333;line-height:1.7;font-family:Georgia,serif}
.t-modern .exco{font-size:12px;font-weight:700;color:#1a2744;font-family:Georgia,serif}
.t-modern .ext{font-size:11px;color:#666;font-family:Georgia,serif}
.t-modern .exd{font-size:11px;color:#444;line-height:1.6;margin-top:3px;font-family:Georgia,serif;padding-left:10px}
.t-modern .extd{font-size:10px;color:#3a5a9e;font-family:Georgia,serif;font-style:italic;margin-top:1px;display:flex;align-items:center;gap:5px}
.t-modern .extd::before{content:"\f017";font-family:"Font Awesome 6 Free";font-weight:900;font-size:8.5px;color:#94b0d6}
.t-modern .pdg{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px}
.t-modern .pdi{font-size:10.5px;color:#444;font-family:Georgia,serif}
.t-modern .pdk{color:#777;font-size:10px}
.t-modern .decl-txt{font-size:10px;color:#555;line-height:1.7;font-family:Georgia,serif;font-style:italic;border-top:1px solid #ddd;padding-top:10px;margin-top:12px}
.t-modern .sig{display:flex;justify-content:space-between;margin-top:20px}
.t-modern .sigb{text-align:center;font-size:10px;color:#555;font-family:Georgia,serif}
.t-modern .sigl{width:100px;height:1px;background:#999;margin:20px auto 4px}

.t-minimal .sig{display:flex;justify-content:space-between;margin-top:20px}
.t-minimal .sigb{text-align:center;font-size:11px;color:#777;font-family:Georgia,serif}
.t-minimal .sigl{width:100px;height:1px;background:#ccc;margin:22px auto 4px}

/* ══ TEMPLATE: Bold ══ */
.t-bold .dh{background:linear-gradient(135deg,#c0392b,#922b21);padding:26px 30px}

/* ══ TEMPLATE: Creative ══ */

@media print {
  @page { size: A4; margin: 0; }

  /* Hide everything UI-related */
  .header,
  .lpanel,
  .mob-toggle,
  .tabs,
  #mob-form,
  #mob-preview { display: none !important; }

  /* Reset body + layout */
  html, body {
    background: #fff !important;
    margin: 0 !important;
    padding: 0 !important;
    height: auto !important;
    overflow: visible !important;
  }

  .layout {
    display: block !important;
    height: auto !important;
    overflow: visible !important;
  }

  /* Show the right panel as full-page */
  .rpanel {
    display: block !important;
    width: 100% !important;
    height: auto !important;
    padding: 0 !important;
    margin: 0 !important;
    background: #fff !important;
    overflow: visible !important;
  }

  /* Resume wrapper fills the page */
  .doc-wrap {
    max-width: 100% !important;
    width: 100% !important;
    filter: none !important;
    box-shadow: none !important;
    margin: 0 !important;
    padding: 0 !important;
    transform: none !important;
  }

  .doc { width: 100% !important; }

  /* Preserve background colours for coloured templates */
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }
}

<div class="header">

    <button class="tb" onclick="setTpl('modern')" id="btn-modern"><span class="tdot" style="background:#3a5a9e"></span>Modern</button>
    <button class="tb" onclick="setTpl('minimal')" id="btn-minimal"><span class="tdot" style="background:#ccc"></span>Minimal</button>
    <button class="tb" onclick="setTpl('bold')" id="btn-bold"><span class="tdot" style="background:#c0392b"></span>Bold</button>

    <button class="tb" onclick="setTpl('creative')" id="btn-creative"><span class="tdot" style="background:#00897b"></span>Creative</button>
    <button class="tb" onclick="setTpl('elegant')" id="btn-elegant"><span class="tdot" style="background:#7b4fa6"></span>Elegant</button>
    <button class="tb" onclick="setTpl('tech')" id="btn-tech"><span class="tdot" style="background:#0d1117"></span>Tech Dark</button>
    <button class="gen-btn" onclick="printResume()">⬇ Download / Print</button>
  </div>
</div>

<div class="mob-toggle">
  <button class="mob-tab active" id="mob-form" onclick="mobSwitch('form')">
    <i class="fa-solid fa-pen-to-square"></i> Fill Form
  </button>
  <button class="mob-tab" id="mob-preview" onclick="mobSwitch('preview')">
    <i class="fa-solid fa-eye"></i> Preview
  </button>
</div>

<div class="layout">
  <div class="lpanel">
    <div class="tabs">
      <button class="tab active" onclick="showSec('info')" id="t-info">Info</button>
      <button class="tab" onclick="showSec('bio')" id="t-bio">Bio</button>
      <button class="tab" onclick="showSec('exp')" id="t-exp">Exp</button>
      <button class="tab" onclick="showSec('edu')" id="t-edu">Edu</button>
      <button class="tab" onclick="showSec('skills')" id="t-skills">Skills</button>
      <button class="tab" onclick="showSec('extra')" id="t-extra">Extra</button>
    </div>
    <div class="fbody" id="sec-info">
      <label class="fl">Full name</label>
      <div class="iw"><input class="fi" id="f-name" placeholder="Arjun Reddy" oninput="render()"><i class="ii fa-solid fa-user"></i></div>
      <label class="fl">Job title</label>
      <div class="iw"><input class="fi" id="f-role" placeholder="Software Engineer" oninput="render()"><i class="ii fa-solid fa-briefcase"></i></div>
      <label class="fl">Email</label>
      <div class="iw"><input class="fi" id="f-email" type="email" placeholder="you@email.com" oninput="render()"><i class="ii fa-solid fa-envelope"></i></div>
      <label class="fl">Mobile</label>
      <div class="iw"><input class="fi" id="f-phone" type="tel" placeholder="+91 98765 43210" oninput="render()"><i class="ii fa-solid fa-mobile-screen"></i></div>
      <label class="fl">City &amp; Country</label>
      <div class="iw"><input class="fi" id="f-loc" placeholder="Hyderabad, India" oninput="render()"><i class="ii fa-solid fa-location-dot"></i></div>
      <label class="fl">LinkedIn</label>
      <div class="iw"><input class="fi" id="f-linkedin" placeholder="linkedin.com/in/you" oninput="render()"><i class="ii fa-brands fa-linkedin"></i></div>
      <label class="fl">Portfolio / Website</label>
      <div class="iw"><input class="fi" id="f-web" placeholder="yoursite.com" oninput="render()"><i class="ii fa-solid fa-globe"></i></div>
    </div>
    <div class="fbody" id="sec-bio" style="display:none">
      <label class="fl">Choose a summary</label>
      <div id="sum-list"></div>
      <label class="fl" style="margin-top:6px">Or write your own</label>
      <textarea class="fi" id="f-summary" style="min-height:80px" placeholder="Type a custom summary..." oninput="render()"></textarea>
      <label class="fl">Hobbies &amp; Interests</label>
      <input class="fi" id="f-hobbies" placeholder="Reading, Cricket, Blogging" oninput="render()">
    </div>
    <div class="fbody" id="sec-exp" style="display:none">
      <div id="exp-list"></div>
      <button class="add-exp" onclick="addExp()"><i class="fa-solid fa-plus"></i> Add Position</button>
    </div>
    <div class="fbody" id="sec-edu" style="display:none">
      <div id="edu-list"></div>
      <button class="add-exp" onclick="addEdu()"><i class="fa-solid fa-plus"></i> Add Qualification</button>
    </div>
    <div class="fbody" id="sec-skills" style="display:none">

        <button class="sadd" onclick="addSkill()">Add</button>
      </div>
      <div class="pills" id="skill-pills"></div>
      <label class="fl" style="margin-top:4px">Strengths</label>
      <div id="strength-list"></div>
      <div class="pills" id="strength-pills"></div>
      <label class="fl" style="margin-top:6px">Languages</label>
      <div class="iw"><input class="fi" id="f-langs" placeholder="English (Fluent), Telugu (Native)" oninput="render()"><i class="ii fa-solid fa-language"></i></div>
      <label class="fl">Certifications</label>
      <div class="iw-ta"><textarea class="fi" id="f-certs" style="min-height:54px" placeholder="AWS Cloud Practitioner, 2024&#10;Google Digital Marketing, 2023" oninput="render()"></textarea><i class="ii fa-solid fa-certificate"></i></div>
    </div>
    <div class="fbody" id="sec-extra" style="display:none">
      <label class="fl">Date of Birth</label>
      <div class="iw"><input class="fi" id="f-dob" placeholder="10 March 2002" oninput="render()"><i class="ii fa-solid fa-cake-candles"></i></div>
      <label class="fl">Father's Name</label>
      <div class="iw"><input class="fi" id="f-father" placeholder="Mr. Krishna Reddy" oninput="render()"><i class="ii fa-solid fa-person"></i></div>
      <label class="fl">Marital Status</label>
      <div class="iw"><select class="fi" id="f-marital" onchange="render()" style="padding-left:34px">
        <option value="">Select...</option>
        <option>Single</option><option>Married</option><option>Divorced</option><option>Widowed</option>
      </select><i class="ii fa-solid fa-heart"></i></div>
      <label class="fl">Nationality</label>
      <div class="iw"><input class="fi" id="f-nationality" placeholder="Indian" oninput="render()"><i class="ii fa-solid fa-flag"></i></div>
      <label class="fl">Religion</label>
      <div class="iw"><input class="fi" id="f-religion" placeholder="Hindu" oninput="render()"><i class="ii fa-solid fa-hands-praying"></i></div>
      <div class="fdiv"></div>
      <label class="fl">Declaration Text</label>
      <div class="iw-ta"><textarea class="fi" id="f-decl" style="min-height:68px" oninput="render()">I hereby declare that all the information stated above is true and correct to the best of my knowledge and belief.</textarea><i class="ii fa-solid fa-file-signature"></i></div>
      <label class="fl">Signature Name</label>
      <div class="iw"><input class="fi" id="f-signame" placeholder="Arjun Reddy" oninput="render()"><i class="ii fa-solid fa-signature"></i></div>
      <label class="fl">Place</label>
      <div class="iw"><input class="fi" id="f-place" placeholder="Hyderabad" oninput="render()"><i class="ii fa-solid fa-location-dot"></i></div>
      <label class="fl">Date</label>
      <div class="iw"><input class="fi" id="f-date" placeholder="17 May 2026" oninput="render()"><i class="ii fa-solid fa-calendar-days"></i></div>
    </div>
  </div>

  <div class="rpanel">
    <div class="doc-wrap"><div class="doc" id="preview"></div></div>
  </div>
</div>

<script>
let tpl='classic',skills=[],expBlocks=[],eduBlocks=[],pickedSum=null,strengths=[],skillCatOpen=null,expId=0,eduId=0;

const SUMMARIES=[
  {cat:'Freshers / Entry Level',color:'#2d4a3e',items:[
    {label:'General Fresher',text:'Enthusiastic and detail-oriented recent graduate with a strong foundation in communication, teamwork, and problem-solving. A quick learner eager to contribute fresh perspectives and a strong work ethic to a forward-thinking organization.'},
    {label:'Tech / IT Fresher',text:'Motivated Computer Science graduate with solid knowledge of programming, data structures, and web technologies. Passionate about building efficient, user-friendly software and excited to grow within a dynamic engineering team.'},
    {label:'Commerce Fresher',text:'Commerce graduate with a strong grasp of financial principles, business communication, and data analysis. Ready to apply academic knowledge in a professional setting and contribute meaningfully to business operations.'},
  ]},
  {cat:'Experienced Professionals',color:'#1a2744',items:[
    {label:'Mid-Level Professional',text:'Results-driven professional with 4+ years of experience delivering high-quality outcomes in fast-paced environments. Proven track record of cross-functional collaboration, process improvement, and stakeholder management.'},
    {label:'Senior Tech Lead',text:'Senior software engineer with 8+ years of experience architecting scalable systems and mentoring engineering teams. Known for translating complex business requirements into robust technical solutions that drive measurable impact.'},
    {label:'Senior Manager',text:'Strategic and people-focused manager with 7+ years of experience leading cross-functional teams and driving organizational growth. Adept at aligning team objectives with company vision and delivering results under pressure.'},
  ]},
  {cat:'Skilled / Trade Professionals',color:'#b5963e',items:[
    {label:'Technical / Trade',text:'Highly skilled and certified technical professional with extensive hands-on experience in precision work, quality control, and safe operational practices. Committed to excellence and continuous skill development.'},
    {label:'Sales & Marketing',text:'Dynamic sales and marketing professional with a proven ability to grow revenue, build client relationships, and execute data-driven campaigns. Skilled at identifying market opportunities and converting them into business results.'},
    {label:'Healthcare Worker',text:'Dedicated and compassionate healthcare professional with strong clinical knowledge and a patient-first approach. Experienced in high-pressure environments with a commitment to quality care, safety, and professional development.'},
  ]},
  {cat:'Career Changers',color:'#c0392b',items:[
    {label:'Returning to Workforce',text:'Motivated professional returning to the workforce after a career break, bringing refreshed focus, updated skills, and a strong commitment to contributing value. Eager to leverage diverse life experience in a new professional chapter.'},
    {label:'Career Switcher',text:'Ambitious professional transitioning into a new field, bringing transferable skills in communication, project management, and analytical thinking. Backed by recent upskilling and a genuine passion for this new direction.'},
  ]},
];

const SKILL_CATS=[
  {cat:'💻 Software / IT',color:'#1a2744',items:['Python','Java','JavaScript','React.js','Node.js','HTML/CSS','SQL','MongoDB','Git','Docker','AWS','REST APIs','TypeScript','C++','Linux','MySQL','Machine Learning','Data Analysis']},
  {cat:'📊 Data & Analytics',color:'#00695c',items:['Excel (Advanced)','Power BI','Tableau','SQL','Python (Pandas)','Google Analytics','Data Visualisation','Statistics','R Programming','Scikit-learn','TensorFlow','ETL Pipelines']},
  {cat:'🎨 Design / Creative',color:'#7b4fa6',items:['Figma','Adobe XD','Photoshop','Illustrator','UI/UX Design','Prototyping','Wireframing','Canva','InDesign','Brand Design','Motion Design','Typography']},
  {cat:'📣 Marketing',color:'#c0392b',items:['SEO/SEM','Google Ads','Social Media Marketing','Content Writing','Email Marketing','HubSpot','Copywriting','Market Research','A/B Testing','Campaign Management','Branding','CRM']},
  {cat:'💼 Business / Finance',color:'#b5963e',items:['Financial Modelling','Budgeting','Forecasting','MS Excel','Tally ERP','SAP','Accounting','Auditing','Project Management','Business Analysis','MIS Reporting','Stakeholder Management']},
  {cat:'🏥 Healthcare',color:'#00897b',items:['Patient Care','Clinical Documentation','First Aid','Medical Coding','EMR Systems','Pharmacology','Wound Care','Lab Techniques','Infection Control','Health & Safety']},
  {cat:'👥 HR & People Ops',color:'#5c6bc0',items:['Recruitment','Talent Acquisition','Onboarding','HRIS (Workday)','Payroll Processing','Employee Relations','Performance Management','Training & Development','Compliance','Org Development']},
  {cat:'⚙️ Operations / Mgmt',color:'#2d4a3e',items:['Supply Chain','Inventory Management','Process Improvement','Lean / Six Sigma','Team Leadership','Vendor Management','ERP Systems','Quality Control','Logistics','Risk Management']},
];

const STRENGTHS=['Communication','Teamwork','Problem Solving','Leadership','Time Management','Adaptability','Attention to Detail','Critical Thinking','Work Under Pressure','Initiative','Creativity','Positive Attitude','Self-Motivation','Reliability','Quick Learner','Decision Making','Conflict Resolution','Negotiation','Multitasking','Analytical Thinking','Empathy','Customer Focus','Accountability','Organisation'];

function buildSumList(){
  let h='';
  SUMMARIES.forEach((cat,ci)=>{
    h+=`<div class="sum-cat" style="color:${cat.color}">${cat.cat}</div>`;
    cat.items.forEach((item,ii)=>{
      const id=`s_${ci}_${ii}`;
      h+=`<div class="sum-opt${pickedSum===id?' picked':''}" onclick="pickSum('${id}','${item.text.replace(/'/g,"&#39;").replace(/\n/g,' ')}')">
        <div class="so-title">${item.label}</div>
        <div class="so-preview">${item.text.slice(0,72)}...</div>
      </div>`;
    });
  });
  document.getElementById('sum-list').innerHTML=h;
}

function pickSum(id,text){pickedSum=id;document.getElementById('f-summary').value=text;buildSumList();render();}

function showSec(id){
  ['info','bio','exp','edu','skills','extra'].forEach(s=>{
    const el=document.getElementById('sec-'+s);if(el)el.style.display=s===id?'block':'none';
    const t=document.getElementById('t-'+s);if(t)t.classList.toggle('active',s===id);
  });
  if(id==='bio')buildSumList();
  if(id==='exp')renderExpForms();
  if(id==='edu')renderEduForms();
  if(id==='skills'){buildSkillCats();buildStrengthList();}
}

function setTpl(t){
  tpl=t;
  ['classic','modern','minimal','bold','executive','creative','elegant','tech'].forEach(b=>document.getElementById('btn-'+b).classList.toggle('active',b===t));
  render();
}

function gv(id){const el=document.getElementById(id);return el?el.value.trim():'';}

function addSkill(){const inp=document.getElementById('skill-inp');const v=inp.value.trim();if(v&&!skills.includes(v)){skills.push(v);inp.value='';renderPills();render();}}
function removeSkill(s){skills=skills.filter(x=>x!==s);renderPills();render();}
function renderPills(){document.getElementById('skill-pills').innerHTML=skills.map(s=>`<span class="pill">${s}<button onclick="removeSkill('${s.replace(/'/g,"\\'")}')">×</button></span>`).join('');}

function saveExpData(){expBlocks.forEach(b=>{b._title=(document.getElementById(`et_${b.id}`)||{}).value||b._title||'';b._company=(document.getElementById(`ec_${b.id}`)||{}).value||b._company||'';b._dur=(document.getElementById(`ed_${b.id}`)||{}).value||b._dur||'';b._loc=(document.getElementById(`el_${b.id}`)||{}).value||b._loc||'';b._desc=(document.getElementById(`edesc_${b.id}`)||{}).value||b._desc||'';});}
function addExp(){saveExpData();expBlocks.push({id:++expId,_title:'',_company:'',_dur:'',_loc:'',_desc:''});renderExpForms();render();}
function removeExp(id){saveExpData();expBlocks=expBlocks.filter(b=>b.id!==id);renderExpForms();render();}
function renderExpForms(){
  const el=document.getElementById('exp-list');
  if(!expBlocks.length){el.innerHTML='<div style="text-align:center;padding:20px 0;color:#999;font-size:13px">No positions yet.<br>Click <b>+ Add Position</b> below.</div>';return;}
  el.innerHTML=expBlocks.map((b,i)=>`<div class="exp-card">
    <div class="exp-ch"><span class="exp-cl"><i class="fa-solid fa-briefcase" style="font-size:11px;margin-right:5px;opacity:.6"></i>Position ${i+1}</span>
    ${expBlocks.length>1?`<button class="exp-rem" onclick="saveExpData();removeExp(${b.id})">✕ Remove</button>`:''}</div>
    <label class="fl">Job Title</label><input class="fi" id="et_${b.id}" placeholder="e.g. Data Analyst" value="${esc(b._title)}" oninput="saveExpData();render()">
    <label class="fl">Company</label><input class="fi" id="ec_${b.id}" placeholder="e.g. Infosys" value="${esc(b._company)}" oninput="saveExpData();render()">
    <label class="fl">Duration</label><input class="fi" id="ed_${b.id}" placeholder="Jan 2022 – Mar 2024" value="${esc(b._dur)}" oninput="saveExpData();render()">
    <label class="fl">Location</label><input class="fi" id="el_${b.id}" placeholder="Hyderabad / Remote" value="${esc(b._loc)}" oninput="saveExpData();render()">
    <label class="fl">Key Responsibilities</label>
    <textarea class="fi" id="edesc_${b.id}" style="min-height:64px" placeholder="• Led a team of 5&#10;• Improved efficiency by 30%" oninput="saveExpData();render()">${esc(b._desc)}</textarea>
  </div>`).join('');
}

function saveEduData(){eduBlocks.forEach(b=>{b._deg=(document.getElementById(`edeg_${b.id}`)||{}).value||b._deg||'';b._uni=(document.getElementById(`euni_${b.id}`)||{}).value||b._uni||'';b._yr=(document.getElementById(`eyr_${b.id}`)||{}).value||b._yr||'';b._gpa=(document.getElementById(`egpa_${b.id}`)||{}).value||b._gpa||'';b._cw=(document.getElementById(`ecw_${b.id}`)||{}).value||b._cw||'';});}
function addEdu(){saveEduData();eduBlocks.push({id:++eduId,_deg:'',_uni:'',_yr:'',_gpa:'',_cw:''});renderEduForms();render();}
function removeEdu(id){saveEduData();eduBlocks=eduBlocks.filter(b=>b.id!==id);renderEduForms();render();}
function renderEduForms(){
  const el=document.getElementById('edu-list');if(!el)return;
  if(!eduBlocks.length){el.innerHTML='<div style="text-align:center;padding:20px 0;color:#999;font-size:13px">No qualifications yet.<br>Click <b>+ Add Qualification</b> below.</div>';return;}
  el.innerHTML=eduBlocks.map((b,i)=>`<div class="exp-card">
    <div class="exp-ch"><span class="exp-cl"><i class="fa-solid fa-graduation-cap" style="font-size:11px;margin-right:5px;opacity:.6"></i>Qualification ${i+1}</span>
    ${eduBlocks.length>1?`<button class="exp-rem" onclick="saveEduData();removeEdu(${b.id})">✕ Remove</button>`:''}</div>
    <label class="fl">Degree / Qualification</label>
    <div class="iw"><input class="fi" id="edeg_${b.id}" placeholder="B.Tech / B.Com / MBA" value="${esc(b._deg)}" oninput="saveEduData();render()"><i class="ii fa-solid fa-graduation-cap"></i></div>
    <label class="fl">Institution</label>
    <div class="iw"><input class="fi" id="euni_${b.id}" placeholder="Osmania University" value="${esc(b._uni)}" oninput="saveEduData();render()"><i class="ii fa-solid fa-building-columns"></i></div>
    <label class="fl">Year</label>
    <div class="iw"><input class="fi" id="eyr_${b.id}" placeholder="2020 – 2024" value="${esc(b._yr)}" oninput="saveEduData();render()"><i class="ii fa-solid fa-calendar"></i></div>
    <label class="fl">GPA / Percentage</label>
    <div class="iw"><input class="fi" id="egpa_${b.id}" placeholder="8.2 / 10 or 78%" value="${esc(b._gpa)}" oninput="saveEduData();render()"><i class="ii fa-solid fa-star"></i></div>
    <label class="fl">Relevant Coursework</label>
    <div class="iw-ta"><textarea class="fi" id="ecw_${b.id}" style="min-height:48px" placeholder="Data Structures, DBMS, Networks..." oninput="saveEduData();render()">${esc(b._cw)}</textarea><i class="ii fa-solid fa-book"></i></div>
  </div>`).join('');
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initials(n){return n?n.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase():'?';}

function contactLine(email,phone,loc,linkedin,web,c){
  c=c||'inherit';
  const items=[];
  if(email)  items.push(`<span class="ci"><i class="fa-solid fa-envelope" style="color:${c}"></i>${email}</span>`);
  if(phone)  items.push(`<span class="ci"><i class="fa-solid fa-mobile-screen" style="color:${c}"></i>${phone}</span>`);
  if(loc)    items.push(`<span class="ci"><i class="fa-solid fa-location-dot" style="color:${c}"></i>${loc}</span>`);
  if(linkedin)items.push(`<span class="ci"><i class="fa-brands fa-linkedin" style="color:${c}"></i>${linkedin}</span>`);
  if(web)    items.push(`<span class="ci"><i class="fa-solid fa-globe" style="color:${c}"></i>${web}</span>`);
  return items.join(' &nbsp;·&nbsp; ');
}

function expSection(T){
  if(!expBlocks.length)return'';
  return expBlocks.map(b=>{
    const t=(document.getElementById(`et_${b.id}`)||{}).value||b._title||'';
    const co=(document.getElementById(`ec_${b.id}`)||{}).value||b._company||'';
    const d=(document.getElementById(`ed_${b.id}`)||{}).value||b._dur||'';
    const l=(document.getElementById(`el_${b.id}`)||{}).value||b._loc||'';
    const desc=(document.getElementById(`edesc_${b.id}`)||{}).value||b._desc||'';
    if(!t&&!co)return'';
    return`<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="${T}exco">${t||'Job Title'}</div>
      </div>
      ${[co,l].filter(Boolean).length?`<div class="${T}ext">${[co,l].filter(Boolean).join(' · ')}</div>`:''}
      ${d?`<div class="${T}extd">${d}</div>`:''}
      ${desc?`<div class="${T}exd">${desc.replace(/\n/g,'<br>')}</div>`:''}
    </div>`;
  }).join('');
}

function eduSection(T){
  if(!eduBlocks.length)return'';
  return eduBlocks.map(b=>{
    const deg=(document.getElementById(`edeg_${b.id}`)||{}).value||b._deg||'';
    const uni=(document.getElementById(`euni_${b.id}`)||{}).value||b._uni||'';
    const yr=(document.getElementById(`eyr_${b.id}`)||{}).value||b._yr||'';
    const gpa=(document.getElementById(`egpa_${b.id}`)||{}).value||b._gpa||'';
    const cw=(document.getElementById(`ecw_${b.id}`)||{}).value||b._cw||'';
    if(!deg&&!uni)return'';
    return`<div style="margin-bottom:12px">
      <div class="${T}exco">${deg||'Degree'}</div>
      ${uni?`<div class="${T}ext">${uni}</div>`:''}
      ${yr?`<div class="${T}extd">${yr}${gpa?` &nbsp;·&nbsp; GPA: ${gpa}`:''}</div>`:gpa?`<div class="${T}extd">GPA: ${gpa}</div>`:''}
      ${cw?`<div class="${T}exd" style="font-size:10px;margin-top:2px">${cw}</div>`:''}
    </div>`;
  }).join('');
}

function pdGrid(T,data){
  const rows=data.filter(d=>d[1]).map(d=>`<div class="${T}pdi"><span class="${T}pdk">${d[0]}: </span>${d[1]}</div>`).join('');
  return rows?`<div class="${T}pdg">${rows}</div>`:'';
}

function sigBlock(T){
  const decl=gv('f-decl'),sig=gv('f-signame'),place=gv('f-place'),date=gv('f-date');
  if(!decl&&!sig&&!place&&!date)return'';
  return`${decl?`<div class="${T}decl-txt">${decl}</div>`:''}
    <div class="${T}sig">
      <div class="${T}sigb"><div class="${T}sigl"></div><div>${place||'Place'}</div><div style="margin-top:2px">${date||'Date'}</div></div>
      <div class="${T}sigb"><div class="${T}sigl"></div><div>Signature</div><div style="margin-top:2px">${sig||'Your Name'}</div></div>
    </div>`;
}

function strengthHTML(T){
  return strengths.length?`<div class="${T}sh">Strengths</div><div>${strengths.map(s=>`<span class="${T}stag">${s}</span>`).join('')}</div>`:'';
}

function render(){
  const name=gv('f-name')||'Your Name',role=gv('f-role')||'Your Title';
  const email=gv('f-email'),phone=gv('f-phone'),loc=gv('f-loc'),linkedin=gv('f-linkedin'),web=gv('f-web');
  const summary=gv('f-summary'),hobbies=gv('f-hobbies'),langs=gv('f-langs'),certs=gv('f-certs');
  const dob=gv('f-dob'),father=gv('f-father'),marital=gv('f-marital'),nationality=gv('f-nationality'),religion=gv('f-religion');
  const hasPD=[dob,father,marital,nationality,religion,phone,email].some(Boolean);
  const hasExp=expBlocks.some(b=>b._title||b._company||(document.getElementById(`et_${b.id}`)||{}).value);
  const hasEdu=eduBlocks.some(b=>b._deg||b._uni||(document.getElementById(`edeg_${b.id}`)||{}).value);
  const pdData=[['DOB',dob],['Father',father],['Marital',marital],['Nationality',nationality],['Religion',religion],['Mobile',phone],['Email',email]];

  const clClassic=contactLine(email,phone,loc,linkedin,web,'#555');
  const clBold=contactLine(email,phone,loc,linkedin,web,'#ffcdd2');
  const clMinimal=contactLine(email,phone,loc,linkedin,web,'#999');
  const clTech=contactLine(email,phone,loc,linkedin,web,'#00ff88');
  const clElegant=contactLine(email,phone,loc,linkedin,web,'#9c6bc9');

  let html='';

function buildSkillCats(){
  const el=document.getElementById('skill-cat-list');if(!el)return;
  el.innerHTML=SKILL_CATS.map((cat,ci)=>`<div style="margin-bottom:5px">
    <div onclick="toggleCat(${ci})" style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border:1px solid var(--border);border-radius:7px;cursor:pointer;background:${skillCatOpen===ci?'#f0f7f4':'#fff'}">
      <span style="font-size:12px;font-weight:500;color:${cat.color}">${cat.cat}</span>
      <i class="fa-solid fa-chevron-${skillCatOpen===ci?'up':'down'}" style="font-size:10px;color:var(--muted)"></i>
    </div>
    ${skillCatOpen===ci?`<div style="display:flex;flex-wrap:wrap;gap:5px;padding:8px 6px;border:1px solid var(--border);border-top:none;border-radius:0 0 7px 7px;background:#fafaf8">
      ${cat.items.map(s=>`<span onclick="toggleCatSkill('${s.replace(/'/g,"\\'")}',this)" style="font-size:11px;padding:3px 9px;border-radius:99px;cursor:pointer;border:1px solid ${cat.color};color:${skills.includes(s)?'#fff':cat.color};background:${skills.includes(s)?cat.color:'transparent'}">${s}</span>`).join('')}
    </div>`:''}
  </div>`).join('');
}

function toggleCat(ci){skillCatOpen=skillCatOpen===ci?null:ci;buildSkillCats();}
function toggleCatSkill(s){if(skills.includes(s))skills=skills.filter(x=>x!==s);else skills.push(s);renderPills();buildSkillCats();render();}

function buildStrengthList(){
  const el=document.getElementById('strength-list');if(!el)return;
  el.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${STRENGTHS.map(s=>`<span onclick="toggleStrength('${s}')" style="font-size:11px;padding:3px 9px;border-radius:99px;cursor:pointer;border:1px solid #b5963e;color:${strengths.includes(s)?'#fff':'#b5963e'};background:${strengths.includes(s)?'#b5963e':'transparent'}">${s}</span>`).join('')}</div>`;
  document.getElementById('strength-pills').innerHTML='';
}
function toggleStrength(s){if(strengths.includes(s))strengths=strengths.filter(x=>x!==s);else strengths.push(s);buildStrengthList();render();}

/* ══════════════════════════════════════════
   PRINT — fixed function
   Ensures only the resume preview prints,
   regardless of whether form or preview tab is active
══════════════════════════════════════════ */
function printResume() {
  // Route through parent SaaS wallet if inside iframe
  try {
    if (window.parent && window.parent.requestPrint) {
      window.parent.requestPrint(10, 'Resume Builder', 'RES-BUILDER');
      // Store layout state so confirmPrint can restore
      window._resumePrintPending = true;
      return;
    }
  } catch(e) {}
  // Fallback: direct print
  _doPrint();
}

// Called by parent after wallet deduction confirmed
window._doPrint = function() {
  const rp = document.querySelector('.rpanel');
  const lp = document.querySelector('.lpanel');
  const rpOld = rp.style.display;
  const lpOld = lp.style.display;
  rp.style.display = 'flex';
  lp.style.display = 'none';
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      rp.style.display = rpOld;
      lp.style.display = lpOld;
    }, 500);
  }, 60);
}

function mobSwitch(tab){
  const isMob=window.innerWidth<=768;if(!isMob)return;
  const lp=document.querySelector('.lpanel'),rp=document.querySelector('.rpanel');
  const ft=document.getElementById('mob-form'),pt=document.getElementById('mob-preview');
  if(tab==='form'){lp.classList.add('mob-active');rp.classList.remove('mob-active');ft.classList.add('active');pt.classList.remove('active');}
  else{rp.classList.add('mob-active');lp.classList.remove('mob-active');pt.classList.add('active');ft.classList.remove('active');}
}

function initMobile(){
  if(window.innerWidth<=768){
    document.querySelector('.lpanel').classList.add('mob-active');
    document.querySelector('.rpanel').classList.remove('mob-active');
  }else{
    ['lpanel','rpanel'].forEach(c=>{const el=document.querySelector('.'+c);el.classList.remove('mob-active');el.style.display='';});
  }
}

window.addEventListener('resize',initMobile);
addExp();addEdu();initMobile();render();
